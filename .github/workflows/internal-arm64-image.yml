name: Internal ARM64 Source Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag. Defaults to main-<short-sha>-arm64."
        required: false
        default: ""
        type: string
      push:
        description: "Push image to GHCR"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-arm64-image:
    name: Build ARM64 image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::8}"
          tag="${{ inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="main-${short_sha}-arm64"
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "short_sha=${short_sha}"
            echo "tag=${tag}"
            echo "image=${image}"
            echo "image_ref=${image}:${tag}"
            echo "created=${created}"
          } >> "$GITHUB_OUTPUT"

          echo "Image: ${image}:${tag}"

      - name: Build and optionally push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.source
          platforms: linux/arm64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.image_ref }}
          labels: |
            org.opencontainers.image.title=RustFS
            org.opencontainers.image.description=Internal RustFS source build for ARM64
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=internal-arm64-source
          cache-to: type=gha,mode=max,scope=internal-arm64-source

      - name: Print image reference
        run: echo "${{ steps.meta.outputs.image_ref }}"
